<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Velha</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f3efe7;
            color: #222;
            font-family: Arial, sans-serif;
        }

        main {
            width: min(92vw, 420px);
            padding: 28px;
            border: 2px solid #222;
            background: #fffaf0;
            box-shadow: 8px 8px 0 #222;
        }

        h1 {
            margin: 0 0 6px;
            font-size: 34px;
            line-height: 1;
        }

        .subtitulo {
            margin: 0 0 22px;
            color: #5f5a50;
        }

        table {
            width: 100%;
            height: min(82vw, 360px);
            border-collapse: collapse;
            margin: 18px 0;
            table-layout: fixed;
        }

        td {
            width: 33.33%;
            height: 33.33%;
            border: 3px solid #222;
            background: #fff;
            text-align: center;
            font-size: clamp(42px, 14vw, 72px);
            font-weight: bold;
            line-height: 1;
            cursor: pointer;
            transition: transform 0.12s ease, background-color 0.12s ease;
        }

        td:hover {
            background: #f6df9f;
            transform: scale(0.97);
        }

        td.ocupado {
            cursor: not-allowed;
        }

        td.ocupado:hover,
        td.bloqueado:hover {
            background: #fff;
            transform: none;
        }

        .jogador-1 {
            color: #215caa;
        }

        .jogador-2 {
            color: #c13b2a;
        }

        button {
            width: 100%;
            border: 2px solid #222;
            background: #222;
            color: #fff;
            padding: 12px 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #444;
        }

        #aviso {
            min-height: 28px;
            margin-top: 18px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<script type="text/javascript" src="js/jogoDaVelha.js"> </script>
<body onload="inicia()">
    <main>
        <h1>Jogo da Velha</h1>
        <p class="subtitulo">Clique em uma casa para jogar.</p>

        <div id="board"></div>

        <button onclick="inicia()">Reiniciar partida</button>
        <div id="aviso">Vez do jogador 1</div>
    </main>

</body>
</html>
